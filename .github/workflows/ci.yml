name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  push:
    # Only run on push to main as a post-merge safety net.
    # `develop` is excluded because every change to develop arrives via a
    # PR (per CLAUDE.md branch policy), and the `pull_request` trigger
    # already covers it. Listing develop here causes every push to a PR'd
    # develop branch to trigger CI twice.
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    name: Lint, Format, Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format Check
        run: bun run format:check

      - name: Build
        run: bun run build

      - name: Tests
        run: bun run test
